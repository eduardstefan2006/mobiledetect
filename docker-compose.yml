version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: nm_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-network_monitor}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: nm_backend
    network_mode: host
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@localhost:5432/${POSTGRES_DB:-network_monitor}
      ROUTER_IPS: ${ROUTER_IPS:-192.168.1.1,192.168.2.1,192.168.3.1,192.168.4.1,192.168.5.1,192.168.5.10,192.168.5.11}
      ROUTER_USERNAME: ${ROUTER_USERNAME:-openclaw}
      ROUTER_PASSWORD: ${ROUTER_PASSWORD:-}
      SCAN_INTERVAL_SECONDS: ${SCAN_INTERVAL_SECONDS:-420}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: nm_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://192.168.1.3:8000
    restart: unless-stopped

volumes:
  db_data:
