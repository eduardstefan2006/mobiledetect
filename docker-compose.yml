version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nm_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_pass
      POSTGRES_DB: network_monitor
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: nm_backend
    environment:
      DATABASE_URL: postgresql://admin:secure_pass@db:5432/network_monitor
      MIKROTIK_HOST: ${MIKROTIK_HOST:-192.168.1.1}
      MIKROTIK_USER: ${MIKROTIK_USER:-api}
      MIKROTIK_PASS: ${MIKROTIK_PASS:-api_password}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --reload

  frontend:
    build: ./frontend
    container_name: nm_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app

volumes:
  db_data:
